<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개인 이력 등록</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1a2744;
      --navy-light: #243259;
      --accent: #4f7cff;
      --accent-soft: #e8edff;
      --gold: #c9a84c;
      --text: #1a2744;
      --text-sub: #6b7a99;
      --border: #dde3f0;
      --bg: #f4f6fb;
      --white: #ffffff;
      --card: #ffffff;
      --danger: #ff4f4f;
      --success: #22c97a;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 2px 16px rgba(26,39,68,0.08);
      --shadow-hover: 0 6px 32px rgba(79,124,255,0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ─── HEADER ─── */
    .header {
      background: var(--navy);
      padding: 32px 0 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(79,124,255,0.12);
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(201,168,76,0.10);
    }
    .header-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--white);
      font-weight: 400;
      letter-spacing: -0.5px;
    }
    .header-sub {
      margin-top: 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      font-weight: 300;
    }

    /* ─── PROGRESS BAR ─── */
    .progress-wrap {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0;
      display: flex;
      justify-content: center;
    }
    .progress-steps {
      display: flex;
      gap: 0;
      max-width: 700px;
      width: 100%;
    }
    .step {
      flex: 1;
      padding: 14px 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-sub);
      border-bottom: 3px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .step.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .step.done {
      color: var(--success);
      border-bottom-color: var(--success);
    }
    .step-num {
      display: inline-flex;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--bg);
      align-items: center;
      justify-content: center;
      font-size: 11px;
      margin-right: 5px;
      margin-bottom: 2px;
    }
    .step.active .step-num { background: var(--accent-soft); color: var(--accent); }
    .step.done .step-num { background: #e6faf2; color: var(--success); }

    /* ─── MAIN CONTAINER ─── */
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 32px 16px 0;
    }

    /* ─── SECTION CARD ─── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card:nth-child(2) { animation-delay: 0.05s; }
    .card:nth-child(3) { animation-delay: 0.10s; }
    .card:nth-child(4) { animation-delay: 0.15s; }

    .card-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--accent-soft);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--navy);
    }
    .card-body {
      padding: 22px 24px;
    }

    /* ─── FORM GRID ─── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .grid-1 { display: grid; gap: 14px; }
    .full { grid-column: 1 / -1; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-sub);
      letter-spacing: 0.3px;
    }
    input, textarea, select {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      outline: none;
      width: 100%;
    }
    input::placeholder { color: #adb7cc; }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(79,124,255,0.10);
    }

    /* ─── DYNAMIC ROWS ─── */
    .dynamic-list { display: flex; flex-direction: column; gap: 12px; }

    .dynamic-row {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeUp 0.3s ease both;
      flex-wrap: wrap;
    }
    .dynamic-row .row-fields {
      flex: 1;
      display: grid;
      gap: 8px;
    }
    .row-del {
      background: none;
      border: none;
      color: #c4ccd9;
      font-size: 18px;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
      margin-top: 2px;
    }
    .row-del:hover { color: var(--danger); background: #fff0f0; }

    /* ─── ADD BUTTON ─── */
    .btn-add {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1.5px dashed var(--accent);
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.2s;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .btn-add:hover {
      background: var(--accent);
      color: var(--white);
      border-style: solid;
    }

    /* ─── SKILL BADGE ─── */
    .skill-row .row-fields {
      grid-template-columns: 1fr auto;
    }
    .level-select {
      width: 110px;
    }

    /* ─── SUBMIT ─── */
    .submit-wrap {
      text-align: center;
      padding: 12px 0 0;
    }
    .btn-submit {
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 50px;
      padding: 16px 56px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(26,39,68,0.25);
      position: relative;
      overflow: hidden;
    }
    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.12) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    .btn-submit:hover {
      background: var(--accent);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    .btn-submit:hover::after { transform: translateX(100%); }
    .btn-submit:active { transform: translateY(0); }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy);
      color: var(--white);
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 8px 32px rgba(26,39,68,0.3);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success::before { content: '✓  '; color: var(--success); }
    .toast.error::before { content: '✕  '; color: #ff7a7a; }

    /* ─── REQUIRED / ERROR ─── */
    label::after { content: ' *'; color: var(--danger); font-size: 11px; }
    input.error, select.error {
      border-color: var(--danger) !important;
      background: #fff5f5 !important;
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 520px) {
      .grid-2 { grid-template-columns: 1fr; }
      .card-body { padding: 18px 16px; }
      .btn-submit { padding: 14px 40px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-label">COMTEC HR System</div>
  <h1>개인 이력 등록</h1>
  <div class="header-sub">Personal Career Registration</div>
</div>

<div class="progress-wrap">
  <div class="progress-steps">
    <div class="step active"><span class="step-num">1</span>기본정보</div>
    <div class="step"><span class="step-num">2</span>자격/경력</div>
    <div class="step"><span class="step-num">3</span>기술스택</div>
    <div class="step"><span class="step-num">4</span>프로젝트</div>
  </div>
</div>

<div class="container">

  <!-- 기본정보 -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">👤</div>
      <div class="card-title">기본정보</div>
    </div>
    <div class="card-body">
      <div class="grid-2">
        <div class="field">
          <label>이름</label>
          <input id="name" placeholder="홍길동">
        </div>
        <div class="field">
          <label>생년월일</label>
          <input id="birth" placeholder="1990-01-01" type="date">
        </div>
        <div class="field full">
          <label>연락처</label>
          <input id="phone" placeholder="010-0000-0000" maxlength="13" inputmode="numeric" oninput="formatPhone(this)">
        </div>
        <div class="field">
          <label>개인 이메일</label>
          <input id="emailPersonal" placeholder="personal@email.com" type="email">
        </div>
        <div class="field">
          <label>회사 이메일</label>
          <input id="emailWork" placeholder="work@comtec.ai.kr" type="email">
        </div>
        <div class="field full">
          <label>주소</label>
          <input id="address" placeholder="서울특별시 강남구 ...">
        </div>
        <div class="field">
          <label>직위</label>
          <input id="position" placeholder="대리, 과장, 팀장 ...">
        </div>
        <div class="field">
          <label>직무</label>
          <input id="job" placeholder="개발, 기획, 영업 ...">
        </div>
        <div class="field">
          <label>출근일자</label>
          <input id="startDate" type="date">
        </div>
        <div class="field">
          <label>최종학력</label>
          <input id="education" placeholder="예) 한국대학교 컴퓨터공학과 졸업">
        </div>
      </div>
    </div>
  </div>

  <!-- 자격/경력/교육 -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">📋</div>
      <div class="card-title">자격 / 경력 / 교육</div>
    </div>
    <div class="card-body">
      <div class="dynamic-list" id="careers"></div>
      <button class="btn-add" onclick="addCareer()">＋ 항목 추가</button>
    </div>
  </div>

  <!-- 기술스택 -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">⚙️</div>
      <div class="card-title">기술스택</div>
    </div>
    <div class="card-body">
      <div class="dynamic-list" id="skills"></div>
      <button class="btn-add" onclick="addSkill()">＋ 기술 추가</button>
    </div>
  </div>

  <!-- 프로젝트 -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">🚀</div>
      <div class="card-title">프로젝트</div>
    </div>
    <div class="card-body">
      <div class="dynamic-list" id="projects"></div>
      <button class="btn-add" onclick="addProject()">＋ 프로젝트 추가</button>
    </div>
  </div>

  <div class="submit-wrap">
    <button class="btn-submit" onclick="submitForm()">등록 완료</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 3000);
}

const CAREER_FIELDS = {
  '':     { f1:'항목명',   f2:'기관명',  f3:'상세내용' },
  '자격증': { f1:'자격증명', f2:'발급기관', f3:'취득 점수 / 등급' },
  '경력':  { f1:'직무/역할', f2:'회사명',  f3:'업무 내용' },
  '교육':  { f1:'과정명',   f2:'교육기관', f3:'교육 내용' },
};

function updateCareerLabels(row) {
  const type = row.querySelector('.career-type').value;
  const cfg = CAREER_FIELDS[type] || CAREER_FIELDS[''];
  row.querySelector('.lbl-f1').textContent = cfg.f1;
  row.querySelector('.lbl-f2').textContent = cfg.f2;
  row.querySelector('.lbl-f3').textContent = cfg.f3;
  row.querySelector('.inp-f1').placeholder = cfg.f1;
  row.querySelector('.inp-f2').placeholder = cfg.f2;
  row.querySelector('.inp-f3').placeholder = cfg.f3;
}

function addCareer() {
  const div = document.createElement("div");
  div.className = "dynamic-row";
  div.style.flexDirection = "column";
  div.style.gap = "10px";
  div.innerHTML = `
    <div style="display:flex;gap:8px;align-items:center">
      <select class="career-type" style="width:110px;flex-shrink:0" onchange="updateCareerLabels(this.closest('.dynamic-row'))">
        <option value="">구분 선택</option>
        <option>자격증</option>
        <option>경력</option>
        <option>교육</option>
      </select>
      <input placeholder="기간" class="inp-period" style="width:130px;flex-shrink:0">
      <div style="flex:1"></div>
      <button class="row-del" onclick="this.closest('.dynamic-row').remove()" title="삭제">×</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 2fr;gap:8px">
      <div class="field" style="gap:4px">
        <label class="lbl-f1" style="font-size:11px">항목명</label>
        <input class="inp-f1" placeholder="항목명">
      </div>
      <div class="field" style="gap:4px">
        <label class="lbl-f2" style="font-size:11px">기관명</label>
        <input class="inp-f2" placeholder="기관명">
      </div>
      <div class="field" style="gap:4px">
        <label class="lbl-f3" style="font-size:11px">상세내용</label>
        <input class="inp-f3" placeholder="상세내용">
      </div>
    </div>
  `;
  document.getElementById("careers").appendChild(div);
}

function addSkill() {
  const div = document.createElement("div");
  div.className = "dynamic-row skill-row";
  div.innerHTML = `
    <div class="row-fields">
      <input placeholder="기술명 (예: Python, AWS...)">
      <select class="level-select">
        <option value="">숙련도</option>
        <option>초급</option>
        <option>중급</option>
        <option>고급</option>
        <option>전문가</option>
      </select>
    </div>
    <button class="row-del" onclick="this.parentElement.remove()" title="삭제">×</button>
  `;
  document.getElementById("skills").appendChild(div);
}

function addProject() {
  const div = document.createElement("div");
  div.className = "dynamic-row";
  div.innerHTML = `
    <div class="row-fields" style="grid-template-columns:2fr 1fr 1fr 1fr 2fr">
      <input placeholder="프로젝트명">
      <input placeholder="기간">
      <input placeholder="회사">
      <input placeholder="역할">
      <input placeholder="개발환경 / 기술스택">
    </div>
    <button class="row-del" onclick="this.parentElement.remove()" title="삭제">×</button>
  `;
  document.getElementById("projects").appendChild(div);
}

function markError(el) {
  el.classList.add('error');
  el.addEventListener('input', () => el.classList.remove('error'), { once: true });
}

function validateBasic() {
  const ids = ['name','birth','phone','emailPersonal','emailWork','address','position','job','startDate','education'];
  let ok = true;
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el.value.trim()) { markError(el); ok = false; }
  });
  return ok;
}

function validateRows(sectionId, fieldCount) {
  const rows = document.querySelectorAll(`#${sectionId} .dynamic-row`);
  let ok = true;
  rows.forEach(row => {
    const fields = row.querySelectorAll('input, select');
    fields.forEach(f => {
      if (!f.value.trim()) { markError(f); ok = false; }
    });
  });
  return ok;
}

function submitForm() {
  const basicOk = validateBasic();
  const careerOk = validateRows('careers');
  const skillOk = validateRows('skills');
  const projectOk = validateRows('projects');

  if (!basicOk || !careerOk || !skillOk || !projectOk) {
    showToast("필수 항목을 모두 입력해주세요.", "error");
    // 첫 번째 에러 필드로 스크롤
    const first = document.querySelector('.error');
    if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  const careers = [...document.querySelectorAll("#careers .dynamic-row")].map(row => ({
    type:   row.querySelector('.career-type').value,
    period: row.querySelector('.inp-period').value,
    title:  row.querySelector('.inp-f1').value,
    org:    row.querySelector('.inp-f2').value,
    detail: row.querySelector('.inp-f3').value,
  }));
  const skills = [...document.querySelectorAll("#skills .dynamic-row")].map(div => ({
    name: div.children[0].children[0].value,
    level: div.children[0].children[1].value
  }));
  const projects = [...document.querySelectorAll("#projects .dynamic-row")].map(div => ({
    name:    div.querySelector('input:nth-child(1)') ? div.querySelectorAll('input')[0].value : '',
    period:  div.querySelectorAll('input')[1].value,
    company: div.querySelectorAll('input')[2].value,
    role:    div.querySelectorAll('input')[3].value,
    env:     div.querySelectorAll('input')[4].value,
  }));
  const data = {
    name: document.getElementById("name").value,
    birth: document.getElementById("birth").value,
    phone: document.getElementById("phone").value,
    emailPersonal: document.getElementById("emailPersonal").value,
    emailWork: document.getElementById("emailWork").value,
    address: document.getElementById("address").value,
    position: document.getElementById("position").value,
    job: document.getElementById("job").value,
    startDate: document.getElementById("startDate").value,
    education: document.getElementById("education").value,
    careers, skills, projects
  };

  fetch("https://script.google.com/macros/s/AKfycbyt1qJj7k_Zu47E8qRnJdFIFH4W2q-R6aEL3bWmO0f2YJJGdcD5EgXs8e0eRhk0mlwYtA/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(() => showToast("개인 이력 등록이 완료되었습니다! 🎉"))
  .catch(() => showToast("전송 중 오류가 발생했습니다.", "error"));
}

function formatPhone(el) {
  const digits = el.value.replace(/\D/g, '').slice(0, 11);
  if (digits.length < 4) el.value = digits;
  else if (digits.length < 7) el.value = `${digits.slice(0,3)}-${digits.slice(3)}`;
  else if (digits.length < 11) el.value = `${digits.slice(0,3)}-${digits.slice(3,7)}-${digits.slice(7)}`;
  else el.value = `${digits.slice(0,3)}-${digits.slice(3,7)}-${digits.slice(7,11)}`;
}

// 초기 기본 1줄
addCareer();
addSkill();
addProject();
const steps = document.querySelectorAll('.step');
const cards = document.querySelectorAll('.card');
window.addEventListener('scroll', () => {
  let current = 0;
  cards.forEach((card, i) => {
    if (window.scrollY + 180 >= card.offsetTop) current = i;
  });
  steps.forEach((s, i) => {
    s.className = 'step' + (i < current ? ' done' : i === current ? ' active' : '');
  });
});
</script>
</body>
</html>
