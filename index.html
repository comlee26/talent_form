<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개인 이력 등록</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1a2744;
      --navy-light: #243259;
      --accent: #4f7cff;
      --accent-soft: #e8edff;
      --gold: #c9a84c;
      --text: #1a2744;
      --text-sub: #6b7a99;
      --border: #dde3f0;
      --bg: #f4f6fb;
      --white: #ffffff;
      --card: #ffffff;
      --danger: #ff4f4f;
      --success: #22c97a;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 2px 16px rgba(26,39,68,0.08);
      --shadow-hover: 0 6px 32px rgba(79,124,255,0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ─── HEADER ─── */
    .header {
      background: var(--navy);
      padding: 32px 0 28px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(79,124,255,0.12);
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -40px; left: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(201,168,76,0.10);
    }
    .header-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      position: relative;
      z-index: 1;
    }
    .header-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      padding: 4px;
    }
    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--white);
      font-weight: 400;
      letter-spacing: -0.5px;
    }
    .header-sub {
      margin-top: 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      font-weight: 300;
    }

    /* ─── PROGRESS BAR ─── */
    .progress-wrap {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0;
      display: flex;
      justify-content: center;
    }
    .progress-steps {
      display: flex;
      gap: 0;
      max-width: 700px;
      width: 100%;
    }
    .step {
      flex: 1;
      padding: 14px 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-sub);
      border-bottom: 3px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .step.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .step.done {
      color: var(--success);
      border-bottom-color: var(--success);
    }
    .step-num {
      display: inline-flex;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--bg);
      align-items: center;
      justify-content: center;
      font-size: 11px;
      margin-right: 5px;
      margin-bottom: 2px;
    }
    .step.active .step-num { background: var(--accent-soft); color: var(--accent); }
    .step.done .step-num { background: #e6faf2; color: var(--success); }

    /* ─── MAIN CONTAINER ─── */
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 32px 16px 0;
    }

    /* ─── SECTION CARD ─── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card:nth-child(2) { animation-delay: 0.05s; }
    .card:nth-child(3) { animation-delay: 0.10s; }
    .card:nth-child(4) { animation-delay: 0.15s; }

    .card-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--accent-soft);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--navy);
    }
    .card-body {
      padding: 22px 24px;
    }

    /* ─── FORM GRID ─── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .grid-1 { display: grid; gap: 14px; }
    .full { grid-column: 1 / -1; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-sub);
      letter-spacing: 0.3px;
    }
    input, textarea, select {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      outline: none;
      width: 100%;
    }
    input::placeholder { color: #adb7cc; }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(79,124,255,0.10);
    }

    /* ─── DYNAMIC ROWS ─── */
    .dynamic-list { display: flex; flex-direction: column; gap: 12px; }

    .dynamic-row {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeUp 0.3s ease both;
      flex-wrap: wrap;
    }
    .dynamic-row .row-fields {
      flex: 1;
      display: grid;
      gap: 8px;
    }
    .row-del {
      background: none;
      border: none;
      color: #c4ccd9;
      font-size: 18px;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
      margin-top: 2px;
    }
    .row-del:hover { color: var(--danger); background: #fff0f0; }

    /* ─── ADD BUTTON ─── */
    .btn-add {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1.5px dashed var(--accent);
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.2s;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .btn-add:hover {
      background: var(--accent);
      color: var(--white);
      border-style: solid;
    }

    /* ─── SKILL BADGE ─── */
    .skill-row .row-fields {
      grid-template-columns: 1fr auto;
    }
    .level-select {
      width: 110px;
    }

    /* ─── SUBMIT ─── */
    .submit-wrap {
      text-align: center;
      padding: 12px 0 0;
    }
    .btn-submit {
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 50px;
      padding: 16px 56px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(26,39,68,0.25);
      position: relative;
      overflow: hidden;
    }
    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.12) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    .btn-submit:hover {
      background: var(--accent);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    .btn-submit:hover::after { transform: translateX(100%); }
    .btn-submit:active { transform: translateY(0); }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy);
      color: var(--white);
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 8px 32px rgba(26,39,68,0.3);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success::before { content: '✓  '; color: var(--success); }
    .toast.error::before { content: '✕  '; color: #ff7a7a; }

    /* ─── REQUIRED / ERROR ─── */
    label::after { content: ' *'; color: var(--danger); font-size: 11px; }
    input.error, select.error {
      border-color: var(--danger) !important;
      background: #fff5f5 !important;
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .optional-card label::after { content: '' !important; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 520px) {
      .grid-2 { grid-template-columns: 1fr; }
      .card-body { padding: 18px 16px; }
      .btn-submit { padding: 14px 40px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <img src="logo.png" alt="COMTEC 로고" class="header-logo">
    <div>
      <div class="header-label">COMTEC HR System</div>
      <h1>개인 이력 등록</h1>
      <div class="header-sub">Personal Career Registration</div>
    </div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-steps">
    <div class="step active"><span class="step-num">1</span>기본정보</div>
    <div class="step"><span class="step-num">2</span>학력</div>
    <div class="step"><span class="step-num">3</span>경력</div>
    <div class="step"><span class="step-num">4</span>자격증</div>
    <div class="step"><span class="step-num">5</span>기타 교육</div>
    <div class="step"><span class="step-num">6</span>기술스택</div>
    <div class="step"><span class="step-num">7</span>프로젝트</div>
  </div>
</div>

<div class="container">

  <!-- 기본정보 -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">👤</div>
      <div class="card-title">기본정보</div>
    </div>
    <div class="card-body">
      <div class="grid-2">
        <div class="field">
          <label>이름</label>
          <input id="name" placeholder="홍길동">
        </div>
        <div class="field">
          <label>생년월일</label>
          <input id="birth" placeholder="1990-01-01" type="date">
        </div>
        <div class="field full">
          <label>연락처</label>
          <input id="phone" placeholder="01000000000" maxlength="13" inputmode="numeric" oninput="formatPhone(this)">
        </div>
        <div class="field">
          <label>개인 이메일</label>
          <input id="emailPersonal" placeholder="personal@email.com" type="email">
        </div>
        <div class="field">
          <label>회사 이메일</label>
          <input id="emailWork" placeholder="work@comtec.ai.kr" type="email">
        </div>
        <div class="field full">
          <label>자택주소</label>
          <input id="address" placeholder="서울특별시 강남구 ...">
        </div>
        <div class="field">
          <label>직위</label>
          <input id="position" placeholder="전무, 이사, 부장, 사원 ...">
        </div>
        <div class="field">
          <label>직무</label>
          <input id="job" placeholder="개발, 기획, 영업 ...">
        </div>
        <div class="field">
          <label>출근일자</label>
          <input id="startDate" type="date">
        </div>
        <div class="field">
          <label>최종학력</label>
          <input id="education" placeholder="예) 한국대학교 컴퓨터공학과 졸업">
        </div>
        <div class="field">
          <label>은행명</label>
          <input id="bankName" placeholder="신한은행, 우리은행 ...">
        </div>
        <div class="field">
          <label>계좌번호</label>
          <input id="bankAccount" placeholder="000-0000-0000-00" inputmode="numeric">
        </div>
      </div>
    </div>
  </div>

  <!-- 학력 -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">🎓</div>
      <div class="card-title">학력</div>
    </div>
    <div class="card-body">
      <div class="dynamic-list" id="educations"></div>
      <button class="btn-add" onclick="addEducation()">＋ 학력 추가</button>
    </div>
  </div>

  <!-- 경력 -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">💼</div>
      <div class="card-title">경력</div>
    </div>
    <div class="card-body">
      <div class="dynamic-list" id="experiences"></div>
      <button class="btn-add" onclick="addExperience()">＋ 경력 추가</button>
    </div>
  </div>

  <!-- 자격증 -->
  <div class="card optional-card">
    <div class="card-header">
      <div class="card-icon">🏅</div>
      <div class="card-title">자격증 <span style="font-size:12px;font-weight:400;color:var(--text-sub)">(선택)</span></div>
    </div>
    <div class="card-body">
      <div class="dynamic-list" id="licenses"></div>
      <button class="btn-add" onclick="addLicense()">＋ 자격증 추가</button>
    </div>
  </div>

  <!-- 기타 교육 -->
  <div class="card optional-card">
    <div class="card-header">
      <div class="card-icon">📚</div>
      <div class="card-title">기타 교육 <span style="font-size:12px;font-weight:400;color:var(--text-sub)">(선택 · 이수 / 수료 포함)</span></div>
    </div>
    <div class="card-body">
      <div class="dynamic-list" id="trainings"></div>
      <button class="btn-add" onclick="addTraining()">＋ 교육 추가</button>
    </div>
  </div>

  <!-- 기술스택 -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">⚙️</div>
      <div class="card-title">기술스택</div>
    </div>
    <div class="card-body">
      <div class="dynamic-list" id="skills"></div>
      <button class="btn-add" onclick="addSkill()">＋ 기술 추가</button>
    </div>
  </div>

  <!-- 프로젝트 -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">🚀</div>
      <div class="card-title">프로젝트</div>
    </div>
    <div class="card-body">
      <div class="dynamic-list" id="projects"></div>
      <button class="btn-add" onclick="addProject()">＋ 프로젝트 추가</button>
    </div>
  </div>

  <div class="submit-wrap">
    <button class="btn-submit" id="submitBtn" onclick="submitForm()">등록 하기</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── 자격증
function addLicense() {
  const div = document.createElement("div");
  div.className = "dynamic-row";
  div.innerHTML = `
    <div class="row-fields" style="grid-template-columns:2fr 1fr 1fr 1fr">
      <div class="field" style="gap:4px"><label style="font-size:11px">자격증명</label><input placeholder="정보처리기사"></div>
      <div class="field" style="gap:4px"><label style="font-size:11px">발급기관</label><input placeholder="한국산업인력공단"></div>
      <div class="field" style="gap:4px"><label style="font-size:11px">취득일</label><input type="date"></div>
      <div class="field" style="gap:4px"><label style="font-size:11px">점수/등급</label><input placeholder="1급, 900점 ..."></div>
    </div>
    <button class="row-del" onclick="this.closest('.dynamic-row').remove()" title="삭제">×</button>
  `;
  document.getElementById("licenses").appendChild(div);
}

// ── 경력 기간 자동 계산
function calcDuration(row) {
  const inputs = row.querySelectorAll('input[type="date"]');
  const start  = inputs[0].value;
  const end    = inputs[1].value;
  const display = row.querySelector('.inp-duration');
  if (!start) { display.value = ''; return; }
  const s = new Date(start);
  const e = end ? new Date(end) : new Date();
  let months = (e.getFullYear() - s.getFullYear()) * 12 + (e.getMonth() - s.getMonth());
  if (months < 0) { display.value = ''; return; }
  const years = Math.floor(months / 12);
  const rem   = months % 12;
  display.value = years > 0
    ? (rem > 0 ? `${years}년 ${rem}개월` : `${years}년`)
    : `${rem}개월`;
}

// ── 경력
function addExperience() {
  const div = document.createElement("div");
  div.className = "dynamic-row";
  div.style.flexDirection = "column";
  div.style.gap = "10px";
  div.innerHTML = `
    <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:8px">
      <div class="field" style="gap:4px"><label style="font-size:11px">회사명</label><input placeholder="(주)컴텍"></div>
      <div class="field" style="gap:4px"><label style="font-size:11px">입사일</label><input type="date" oninput="calcDuration(this.closest('.dynamic-row'))"></div>
      <div class="field" style="gap:4px"><label style="font-size:11px">퇴사일</label><input type="date" oninput="calcDuration(this.closest('.dynamic-row'))"></div>
      <div class="field" style="gap:4px">
        <label style="font-size:11px">근무기간</label>
        <input class="inp-duration" placeholder="자동계산" readonly style="background:#f0f0f5;color:var(--accent);font-weight:600;cursor:default">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 2fr;gap:8px">
      <div class="field" style="gap:4px"><label style="font-size:11px">직위</label><input placeholder="대리, 과장 ..."></div>
      <div class="field" style="gap:4px"><label style="font-size:11px">직무/역할</label><input placeholder="백엔드 개발"></div>
      <div class="field" style="gap:4px"><label style="font-size:11px">업무 내용</label><input placeholder="주요 담당 업무 요약"></div>
    </div>
    <button class="row-del" style="align-self:flex-end" onclick="this.closest('.dynamic-row').remove()" title="삭제">×</button>
  `;
  document.getElementById("experiences").appendChild(div);
}

// ── 학력
function addEducation() {
  const div = document.createElement("div");
  div.className = "dynamic-row";
  div.innerHTML = `
    <div class="row-fields" style="grid-template-columns:1fr 2fr 1fr 1fr 1fr">
      <div class="field" style="gap:4px"><label style="font-size:11px">학위구분</label>
        <select>
          <option value="">선택</option>
          <option>박사</option>
          <option>석사</option>
          <option>학사</option>
          <option>전문학사</option>
          <option>고등학교</option>
          <option>기타</option>
        </select>
      </div>
      <div class="field" style="gap:4px"><label style="font-size:11px">학교명</label><input placeholder="한국대학교"></div>
      <div class="field" style="gap:4px"><label style="font-size:11px">전공</label><input placeholder="컴퓨터공학과"></div>
      <div class="field" style="gap:4px"><label style="font-size:11px">기간</label><input placeholder="2010.03 ~ 2014.02"></div>
      <div class="field" style="gap:4px"><label style="font-size:11px">졸업구분</label>
        <select>
          <option value="">선택</option>
          <option>졸업</option>
          <option>졸업예정</option>
          <option>재학중</option>
          <option>중퇴</option>
          <option>수료</option>
        </select>
      </div>
    </div>
    <button class="row-del" onclick="this.closest('.dynamic-row').remove()" title="삭제">×</button>
  `;
  document.getElementById("educations").appendChild(div);
}

    <div class="row-fields" style="grid-template-columns:2fr 1fr 1fr 1fr">

      <div class="field" style="gap:4px"><label style="font-size:11px">교육기관</label><input placeholder="패스트캠퍼스"></div>
      <div class="field" style="gap:4px"><label style="font-size:11px">기간</label><input placeholder="2024.01 ~ 2024.03"></div>
      <div class="field" style="gap:4px"><label style="font-size:11px">이수구분</label>
        <select>
          <option value="">선택</option>
          <option>이수</option>
          <option>수료</option>
          <option>수강중</option>
        </select>
      </div>
    </div>
    <button class="row-del" onclick="this.closest('.dynamic-row').remove()" title="삭제">×</button>

}

function addSkill() {
  const div = document.createElement("div");
  div.className = "dynamic-row skill-row";
  div.innerHTML = `
    <div class="row-fields">
      <input placeholder="기술명 (예: Python, AWS...)">
      <select class="level-select">
        <option value="">숙련도</option>

function addProject() {
  const div = document.createElement("div");
  div.className = "dynamic-row";
  div.innerHTML = `
    <div class="row-fields" style="grid-template-columns:2fr 1fr 1fr 1fr 2fr">
      <input placeholder="프로젝트명">

function markError(el) {
  el.classList.add('error');
  el.addEventListener('input', () => el.classList.remove('error'), { once: true });
}

function validateBasic() {
  const ids = ['name','birth','phone','emailPersonal','emailWork','address','position','job','startDate','education','bankName','bankAccount'];
  let ok = true;
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el.value.trim()) { markError(el); ok = false; }
  });
  return ok;
}

function validateRows(sectionId, fieldCount) {
  const rows = document.querySelectorAll(`#${sectionId} .dynamic-row`);
  let ok = true;
  rows.forEach(row => {
    const fields = row.querySelectorAll('input, select');
    fields.forEach(f => {
      if (!f.value.trim()) { markError(f); ok = false; }
    });
  });
  return ok;
}

function submitForm() {
  const basicOk = validateBasic();
  const licenseOk    = true; // 자격증은 선택 입력
  const experienceOk = validateRows('experiences');
  const educationOk  = validateRows('educations');
  const trainingOk   = true; // 기타 교육은 선택 입력
  const skillOk      = validateRows('skills');
  const projectOk    = validateRows('projects');

  if (!basicOk || !licenseOk || !experienceOk || !educationOk || !trainingOk || !skillOk || !projectOk) {
    showToast("필수 항목을 모두 입력해주세요.", "error");
    // 첫 번째 에러 필드로 스크롤
    const first = document.querySelector('.error');
    if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  const licenses = [...document.querySelectorAll("#licenses .dynamic-row")].map(row => {
    const inputs = row.querySelectorAll("input");
    return { name: inputs[0].value, issuer: inputs[1].value, date: inputs[2].value, grade: inputs[3].value };
  });
  const experiences = [...document.querySelectorAll("#experiences .dynamic-row")].map(row => {
    const inputs = row.querySelectorAll("input");
    return {
      company:   inputs[0].value,
      startDate: inputs[1].value,
      endDate:   inputs[2].value,
      duration:  inputs[3].value,  // 근무기간 자동계산값
      position:  inputs[4].value,
      role:      inputs[5].value,
      detail:    inputs[6].value
    };
  });
  const educations = [...document.querySelectorAll("#educations .dynamic-row")].map(row => {
    const fields = row.querySelectorAll("input, select");
    return { degree: fields[0].value, school: fields[1].value, major: fields[2].value, period: fields[3].value, status: fields[4].value };
  });
  const trainings = [...document.querySelectorAll("#trainings .dynamic-row")].map(row => {
    const inputs = row.querySelectorAll("input, select");
    return { course: inputs[0].value, org: inputs[1].value, period: inputs[2].value, status: inputs[3].value };
  });
  const skills = [...document.querySelectorAll("#skills .dynamic-row")].map(div => ({
    name: div.children[0].children[0].value,
    level: div.children[0].children[1].value
  }));
  const projects = [...document.querySelectorAll("#projects .dynamic-row")].map(div => ({
    name:    div.querySelector('input:nth-child(1)') ? div.querySelectorAll('input')[0].value : '',
    period:  div.querySelectorAll('input')[1].value,
    company: div.querySelectorAll('input')[2].value,
    role:    div.querySelectorAll('input')[3].value,
    env:     div.querySelectorAll('input')[4].value,
  }));
  const data = {
    name: document.getElementById("name").value,
    birth: document.getElementById("birth").value,
    phone: document.getElementById("phone").value,
    emailPersonal: document.getElementById("emailPersonal").value,
    emailWork: document.getElementById("emailWork").value,
    address: document.getElementById("address").value,
    position: document.getElementById("position").value,
    job: document.getElementById("job").value,
    startDate: document.getElementById("startDate").value,
    education: document.getElementById("education").value,
    bankName: document.getElementById("bankName").value,
    bankAccount: document.getElementById("bankAccount").value,
    licenses, experiences, educations, trainings, skills, projects
  };

  fetch("https://script.google.com/macros/s/AKfycbyt1qJj7k_Zu47E8qRnJdFIFH4W2q-R6aEL3bWmO0f2YJJGdcD5EgXs8e0eRhk0mlwYtA/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
  })
  .then(() => {
    showToast("개인 이력 등록이 완료되었습니다! 🎉");
    const btn = document.getElementById("submitBtn");
    btn.textContent = "등록 완료 ✓";
    btn.style.background = "var(--success)";
    btn.disabled = true;
  })
  .catch(() => showToast("전송 중 오류가 발생했습니다.", "error"));
}

function formatPhone(el) {
  const digits = el.value.replace(/\D/g, '').slice(0, 11);
  if (digits.length < 4) el.value = digits;
  else if (digits.length < 7) el.value = `${digits.slice(0,3)}-${digits.slice(3)}`;
  else if (digits.length < 11) el.value = `${digits.slice(0,3)}-${digits.slice(3,7)}-${digits.slice(7)}`;
  else el.value = `${digits.slice(0,3)}-${digits.slice(3,7)}-${digits.slice(7,11)}`;
}

// 초기 기본 1줄
addLicense();
addExperience();
addEducation();
addTraining();
addSkill();
addProject();

const steps = document.querySelectorAll('.step');
const cards = document.querySelectorAll('.card');

// 스텝 클릭 → 해당 카드로 스크롤
steps.forEach((step, i) => {
  step.addEventListener('click', () => {
    cards[i].scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
});

// 스크롤 시 현재 섹션 active 표시
window.addEventListener('scroll', () => {
  let current = 0;
  cards.forEach((card, i) => {
    if (window.scrollY + 200 >= card.offsetTop) current = i;
  });
  steps.forEach((s, i) => {
    s.className = 'step' + (i < current ? ' done' : i === current ? ' active' : '');
  });
});
</script>
